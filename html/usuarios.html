<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Usuarios - ICAP</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👥</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f4f6f9;
  color: #333;
  min-height: 100vh;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}
.header {
  background: linear-gradient(135deg, #4a0404 0%, #6b0f0f 100%);
  color: white;
  padding: 20px;
  text-align: center;
  margin-bottom: 30px;
  border-radius: 8px;
}
.header h1 { font-size: 24px; margin-bottom: 5px; }
.header p { font-size: 14px; opacity: 0.9; }
.card {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
  font-size: 14px;
}
.btn-primary { background: #6b0f0f; color: white; }
.btn-primary:hover { background: #8b0000; }
.btn-secondary { background: #888; color: white; }
.btn-success { background: #28a745; color: white; }
.btn-danger { background: #dc3545; color: white; }
.btn-warning { background: #ffc107; color: #333; }
.btn-info { background: #0066cc; color: white; }
.form-group { margin-bottom: 15px; }
.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
  color: #4a0404;
  font-size: 14px;
}
.form-control {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

/* Tabla de usuarios */
.tabla-container {
  overflow-x: auto;
  background: white;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.tabla-usuarios {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.tabla-usuarios thead {
  background: linear-gradient(135deg, #4a0404 0%, #6b0f0f 100%);
  color: white;
}
.tabla-usuarios th {
  padding: 12px 10px;
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
}
.tabla-usuarios td {
  padding: 10px;
  border-bottom: 1px solid #e0e0e0;
  vertical-align: middle;
}
.tabla-usuarios tbody tr:hover {
  background: #fff5f5;
}
.tabla-usuarios tbody tr:nth-child(even) {
  background: #fafafa;
}
.tabla-usuarios tbody tr:nth-child(even):hover {
  background: #fff5f5;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 10px;
}
.modal-content {
  background: white;
  border-radius: 12px;
  padding: 35px;
  width: 95%;
  max-width: 900px;
  max-height: 95vh;
  overflow-y: auto;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

/* Badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}
.badge-admin { background: #6b0f0f; color: white; }
.badge-usuario { background: #0066cc; color: white; }

/* Paginación */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.pagination button {
  padding: 8px 15px;
  background: #6b0f0f;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
}
.pagination button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.pagination .page-num {
  width: 35px;
  height: 35px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.pagination .page-num.active {
  background: #4a0404;
  border: 2px solid #4a0404;
}

/* Foto */
.foto-mini {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #6b0f0f;
  background: #ddd;
}

/* Stats */
.stats-bar {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-card {
  flex: 1;
  min-width: 150px;
  background: white;
  padding: 15px;
  border-radius: 8px;
  border-left: 4px solid #6b0f0f;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.stat-card h3 {
  font-size: 24px;
  color: #4a0404;
  margin: 0;
}
.stat-card p {
  font-size: 12px;
  color: #888;
  margin: 5px 0 0;
}

@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .modal-content { padding: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>Gestión de Usuarios</h1>
    <p>Programa de Supervisión Intensiva - ICAP</p>
  </div>

  <!-- Estadísticas -->
  <div class="stats-bar">
    <div class="stat-card">
      <h3 id="statTotal">0</h3>
      <p>Total de Usuarios</p>
    </div>
    <div class="stat-card" style="border-left-color: #6b0f0f;">
      <h3 id="statAdmins">0</h3>
      <p>Administradores</p>
    </div>
    <div class="stat-card" style="border-left-color: #0066cc;">
      <h3 id="statUsuarios">0</h3>
      <p>Usuarios Regulares</p>
    </div>
  </div>

  <!-- Panel de control -->
  <div class="card">
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
      <input type="text" id="buscarUsuario" class="form-control" placeholder="🔍 Buscar por cédula, nombre o apellido..." style="flex: 1; min-width: 250px;">
      <button id="btnNuevoUsuario" class="btn btn-primary">➕ Nuevo Usuario</button>
      <button id="btnRefrescar" class="btn btn-info">🔄 Refrescar</button>
    </div>

    <div id="contadorUsuarios" style="text-align: center; color: #666; margin-bottom: 15px; font-size: 14px;"></div>

    <!-- Tabla de usuarios -->
    <div class="tabla-container">
      <table class="tabla-usuarios">
        <thead>
          <tr>
            <th>Foto</th>
            <th>Cédula</th>
            <th>Nombre Completo</th>
            <th>Jerarquía</th>
            <th>Nivel</th>
            <th>N° Expediente</th>
            <th>Causa Sanción</th>
            <th>Fecha Creación</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaUsuariosBody">
          <tr>
            <td colspan="9" style="text-align: center; padding: 30px; color: #888;">Cargando usuarios...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Paginación -->
    <div id="paginacionUsuarios" class="pagination"></div>
  </div>
</div>

<!-- Modal: Crear/Editar Usuario -->
<div id="modalUsuario" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h2 id="modalUsuarioTitulo" style="color: #4a0404; margin-bottom: 20px;">Nuevo Usuario</h2>
    
    <div class="grid-2">
      <div class="form-group">
        <label>Cédula: *</label>
        <input type="text" id="usuarioCedula" class="form-control" placeholder="Ej: 19451800">
      </div>
      <div class="form-group">
        <label>Número de Expediente:</label>
        <input type="text" id="usuarioExpediente" class="form-control" placeholder="Ej: 00001">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Primer Nombre: *</label>
        <input type="text" id="usuarioNombre" class="form-control">
      </div>
      <div class="form-group">
        <label>Primer Apellido: *</label>
        <input type="text" id="usuarioApellido" class="form-control">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Jerarquía:</label>
        <input type="text" id="usuarioJerarquia" class="form-control" placeholder="Ej: Inspector, Oficial, etc.">
      </div>
      <div class="form-group">
        <label>Nivel de Acceso: *</label>
        <select id="usuarioNivel" class="form-control">
          <option value="usuario">Usuario</option>
          <option value="administrador">Administrador</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Causa de Sanción:</label>
      <textarea id="usuarioCausaSancion" class="form-control" rows="3" placeholder="Describa la causa de sanción (opcional)"></textarea>
    </div>

    <div class="form-group">
      <label>Foto de Perfil:</label>
      <input type="file" id="usuarioFoto" accept="image/*" class="form-control">
      <div id="fotoPreviewContainer" style="margin-top: 10px; display: none;">
        <img id="fotoPreview" style="max-width: 100px; border-radius: 50%; border: 2px solid #6b0f0f;">
      </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button id="btnGuardarUsuario" class="btn btn-primary" style="flex: 1;">💾 Guardar</button>
      <button id="btnCancelarUsuario" class="btn btn-secondary" style="flex: 1;">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal: Confirmación de eliminación -->
<div id="modalEliminar" class="modal-overlay" style="display: none;">
  <div class="modal-content" style="max-width: 500px;">
    <h2 style="color: #dc3545; margin-bottom: 20px;">⚠️ Confirmar Eliminación</h2>
    <p id="mensajeEliminar" style="margin-bottom: 20px; font-size: 15px; line-height: 1.6;"></p>
    <div style="display: flex; gap: 10px;">
      <button id="btnConfirmarEliminar" class="btn btn-danger" style="flex: 1;">🗑️ Sí, Eliminar</button>
      <button id="btnCancelarEliminar" class="btn btn-secondary" style="flex: 1;">Cancelar</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/usuarios.js"></script>
</body>
</html>
