<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICAP - Sistema de Supervisión Intensiva</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a0404 0%, #6b0f0f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 15px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-container img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 15px;
    }
    .logo-container h1 {
      color: #4a0404;
      font-size: 22px;
      margin-bottom: 5px;
    }
    .logo-container p {
      color: #666;
      font-size: 13px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #4a0404;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #6b0f0f;
    }
    #passwordGroup {
      display: none;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #6b0f0f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-login:hover { background: #8b0000; }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }
    .mensaje {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    .mensaje.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .mensaje.exito {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .mensaje.info {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      display: block;
    }
    .security-notice {
      margin-top: 20px;
      padding: 10px;
      background: #f8f9fa;
      border-left: 3px solid #6b0f0f;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <img src="img/logo1.png" alt="Logo ICAP">
      <h1>Programa de Supervisión Intensiva</h1>
      <p>ICAP - Cuerpo de Policía Nacional Bolivariana</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="cedula">🆔 Cédula:</label>
        <input type="text" id="cedula" placeholder="Ingrese su cédula" required maxlength="8" inputmode="numeric">
      </div>
      
      <div class="form-group" id="passwordGroup">
        <label for="password">🔐 Contraseña de Administrador:</label>
        <input type="password" id="password" placeholder="Ingrese su contraseña">
      </div>
      
      <button type="submit" class="btn-login" id="btnIngresar">Ingresar</button>
      
      <div id="mensaje" class="mensaje"></div>
      
      <div class="security-notice">
        🔒 <strong>Seguridad:</strong> Los administradores deben ingresar su contraseña para acceder al sistema.
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/seguridad.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
