<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICAP - Acceso Restringido</title>
  
  <style>
    /* --- ESTILOS CSS INTEGRADOS --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* Fondo blanco limpio */
      background-color: #ffffff; 
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* --- MARCA DE AGUA --- */
    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 600px;
      opacity: 0.06; /* Opacidad muy baja para que sea sutil. Ajusta si es necesario */
      pointer-events: none; /* Para que no bloquee los clics */
      z-index: 0;
    }

    /* --- CONTENEDOR DEL LOGIN --- */
    .login-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1; /* Se pone por encima de la marca de agua */
    }

    .login-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 35px 30px;
      /* Sombra suave para que resalte sobre el fondo blanco */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
      border-top: 5px solid #6b0f0f; /* Detalle vinotinto institucional */
      text-align: center;
    }

    /* --- LOGO SUPERIOR --- */
    .logo-container {
      margin-bottom: 15px;
    }

    .logo {
      max-width: 90px;
      height: auto;
    }

    /* --- TÍTULOS --- */
    h1 {
      color: #4a0404; /* Vinotinto oscuro */
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .subtitle {
      color: #6b0f0f;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 25px;
      opacity: 0.8;
    }

    /* --- FORMULARIO --- */
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      color: #4a0404;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      background-color: #fafafa;
    }

    input:focus {
      outline: none;
      border-color: #8b0000;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #6b0f0f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-login:hover {
      background: #8b0000;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(139, 0, 0, 0.2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* --- MENSAJES --- */
    .mensaje {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .mensaje.error {
      background: #ffe6e6;
      color: #cc0000;
      border: 1px solid #ffcccc;
      display: block;
    }

    .mensaje.exito {
      background: #e6ffe6;
      color: #008000;
      border: 1px solid #ccffcc;
      display: block;
    }

    /* --- RESPONSIVE PARA CELULARES --- */
    @media (max-width: 480px) {
      body {
        padding: 15px;
      }
      
      .login-box {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 19px;
      }

      .subtitle {
        font-size: 11px;
      }

      .logo {
        max-width: 75px;
      }
      
      .watermark {
        width: 90%; /* En celulares la marca de agua ocupa un poco más de ancho */
      }
    }
  </style>
</head>
<body>

  <!-- Marca de agua de fondo -->
  <img src="img/logo2.png" alt="Marca de agua" class="watermark">

  <div class="login-container">
    <div class="login-box">
      
      <!-- Logo principal encima del título -->
      <div class="logo-container">
        <img src="img/logo1.png" alt="Logo ICAP" class="logo">
      </div>
      
      <!-- Títulos actualizados -->
      <h1>Programa de Supervisión Intensiva</h1>
      <p class="subtitle">ICAP Acceso Restringido</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="cedula">Número de Cédula</label>
          <input 
            type="text" 
            id="cedula" 
            name="cedula" 
            placeholder="Ingrese su número de cédula"
            inputmode="numeric"
            pattern="[0-9]*"
            required
            autocomplete="off"
          >
        </div>
        
        <button type="submit" class="btn-login" id="btnIngresar">Ingresar</button>
        
        <div id="mensaje" class="mensaje"></div>
      </form>
    </div>
  </div>
  
  <!-- Librería de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Tu archivo JS separado -->
  <script src="js/index.js"></script>

</body>
</html>
